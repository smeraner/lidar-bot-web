name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  webapp-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    - run: npm install
    - run: npm run lint
    - run: npm run test
    - run: npm run build --workspace=webapp

  firmware-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v3
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install PlatformIO Core
      run: pip install --upgrade platformio

    - name: Build Bridge Firmware
      run: pio run -d firmware-bridge

    - name: Check Bridge Firmware (Cppcheck)
      run: pio check -d firmware-bridge

    - name: Build LidarBot Firmware
      run: pio run -d firmware-lidarbot

    - name: Check LidarBot Firmware (Cppcheck)
      run: pio check -d firmware-lidarbot