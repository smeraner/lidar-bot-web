<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webapp</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 data-i18n="title">LidarBot Control</h1>
        <div class="status-container">
          <div id="bridgeStatus" class="status-item">
            <span class="status-dot"></span>
            <span data-i18n="bridge">Bridge</span>
          </div>
          <div id="robotStatus" class="status-item">
            <span class="status-dot"></span>
            <span id="robotStatusText" data-i18n="robot">Robot</span>
          </div>
        </div>
        <div class="controls">
          <select id="languageSelect" class="premium-select">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
          <div class="dropdown">
            <button id="mainConnectBtn" class="premium-btn" data-i18n="connect">Connect LidarBot</button>
            <div class="dropdown-content">
              <button id="connectBtn" class="dropdown-item">🔌 USB / Bridge</button>
              <button id="btConnectBtn" class="dropdown-item">🔵 Bluetooth (BLE)</button>
            </div>
          </div>
          <button id="pairBtn" class="premium-btn" data-i18n="pair" style="display: none;">Pair Robot</button>
          <button id="runLiveBtn" class="premium-btn primary" data-i18n="run_live" disabled>Run Live</button>
          <button id="stopBtn" class="premium-btn danger" style="display: none;" data-i18n="stop_program">Stop</button>
          <button id="eStopBtn" class="premium-btn danger-estop" title="Emergency Stop (Esc)">🚨 E-STOP</button>
        </div>
      </header>
      <div id="executionBar" class="execution-bar hidden">
        <div class="exec-status">
          <span id="execIcon" class="exec-icon">⏳</span>
          <span id="execText" class="exec-text">Program running...</span>
          <span id="execTimer" class="exec-timer">0.0s</span>
        </div>
        <div class="exec-progress-track">
          <div id="execProgress" class="exec-progress-bar"></div>
        </div>
        <button id="execStopBtn" class="exec-stop-btn" title="Stop Program">■</button>
      </div>
      <main>
        <div id="blocklyDiv"></div>
        
        <aside id="sidebarRight" class="collapsed">
          <div class="resizer" id="sidebarResizer"></div>
          <div class="sidebar-tray">

            <button id="simToggleBtn" class="tray-btn" title="Simulation">🤖</button>
            <button id="lidarToggleBtn" class="tray-btn" title="Lidar">📡</button>
          </div>
          <div class="sidebar-content">
            <div id="simulationPanel" class="panel hidden">
              <div class="panel-header">
                <h3 data-i18n="simulation">Simulation</h3>
                <div class="panel-actions">
                  <button id="addObstacleBtn" class="text-btn" title="Add Obstacle">⊕ Obstacle</button>
                  <button id="runSimBtn" class="premium-btn sm" data-i18n="run_sim">Run Simulation</button>
                  <button id="resetSimBtn" class="text-btn" data-i18n="reset">Reset</button>
                </div>
              </div>
              <div class="canvas-wrap">
                <canvas id="simulationCanvas"></canvas>
              </div>
            </div>
            <div id="lidarPanel" class="panel hidden">
              <div class="panel-header">
                <h3 data-i18n="lidar">Lidar</h3>
              </div>
              <div class="canvas-wrap">
                <canvas id="lidarCanvas"></canvas>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
